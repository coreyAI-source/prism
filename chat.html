<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prism — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
</head>
<body class="page-chat">

  <!-- ░░ SHARED BACKGROUND ░░ -->
  <div class="dot-grid"  aria-hidden="true"></div>
  <div class="aurora"    aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>
  <div class="grain"     aria-hidden="true"></div>
  <div id="spotlight"    aria-hidden="true"></div>

  <!-- ░░ HEADER ░░ -->
  <header class="header glass">
    <a href="index.html" class="logo" aria-label="Back to home">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 40 40" fill="none">
            <defs>
              <linearGradient id="chL" x1="0%" y1="0%" x2="80%" y2="100%"><stop offset="0%" stop-color="#f0abfc"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
              <linearGradient id="chR" x1="20%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
            </defs>
            <polygon points="3,34 20,4 20,34" fill="url(#chL)"/>
            <polygon points="20,4 37,34 20,34" fill="url(#chR)" opacity="0.92"/>
            <line x1="20" y1="4" x2="20" y2="34" stroke="rgba(255,255,255,0.4)" stroke-width="0.75"/>
            <line x1="12" y1="9" x2="8" y2="26" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-text">Prism</span>
    </a>
    <a href="games.html" class="icon-btn" title="Games" aria-label="Games" style="text-decoration:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 2l-4 5-4-5"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="12" y1="11" x2="12" y2="17"/></svg>
    </a>
    <button class="icon-btn" id="clearBtn" title="New chat" aria-label="New chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
    </button>
  </header>

  <!-- ░░ TOP AD ░░ -->
  <div class="ad-strip ad-top" aria-hidden="true">
    <ins class="adsbygoogle" style="display:block"
      data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX" data-ad-slot="YOUR_TOP_AD_SLOT"
      data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <!-- ░░ LAYOUT ░░ -->
  <div class="layout">

    <aside class="ad-side" aria-hidden="true">
      <ins class="adsbygoogle" style="display:block;width:160px;height:600px"
        data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX" data-ad-slot="YOUR_LEFT_AD_SLOT"
        data-ad-format="fixed"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </aside>

    <!-- Spinning gradient border wrapper -->
    <div class="chat-glow">
      <main class="chat-card" role="main">

        <!-- Messages -->
        <div class="messages" id="messages" aria-live="polite">
          <div class="welcome" id="welcome">
            <div class="welcome-prism" aria-hidden="true">
              <svg viewBox="0 0 80 80" fill="none">
                <defs>
                  <linearGradient id="wpL" x1="0%" y1="0%" x2="80%" y2="100%"><stop offset="0%" stop-color="#f0abfc"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
                  <linearGradient id="wpR" x1="20%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
                  <filter id="wpGlow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                </defs>
                <polygon points="8,68 40,6 40,68" fill="url(#wpL)" filter="url(#wpGlow)"/>
                <polygon points="40,6 72,68 40,68" fill="url(#wpR)" filter="url(#wpGlow)" opacity="0.92"/>
                <line x1="40" y1="6" x2="40" y2="68" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
                <line x1="24" y1="16" x2="16" y2="50" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="welcome-copy">
              <h1 class="welcome-heading">What do you need?</h1>
              <p class="welcome-sub">Essays · Math · Science · Coding · History</p>
            </div>
            <div class="chips" role="list">
              <button class="chip" role="listitem" data-prompt="Help me write a strong introduction for an essay about ">Write an essay</button>
              <button class="chip" role="listitem" data-prompt="Explain this concept to me simply, step by step: ">Explain anything</button>
              <button class="chip" role="listitem" data-prompt="Help me solve this step by step: ">Solve a problem</button>
              <button class="chip" role="listitem" data-prompt="Check and improve my writing: ">Improve my writing</button>
            </div>
          </div>
        </div>

        <!-- Input -->
        <div class="input-area">
          <div class="input-wrapper" id="inputWrapper">
            <textarea
              id="userInput"
              placeholder="Ask anything…"
              rows="1"
              maxlength="4000"
              aria-label="Message"
            ></textarea>
            <button class="send-btn" id="sendBtn" aria-label="Send">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
              </svg>
            </button>
          </div>
          <p class="disclaimer">Prism can be wrong — use it to learn, not copy.</p>
        </div>

      </main>
    </div>

    <aside class="ad-side" aria-hidden="true">
      <ins class="adsbygoogle" style="display:block;width:160px;height:600px"
        data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX" data-ad-slot="YOUR_RIGHT_AD_SLOT"
        data-ad-format="fixed"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </aside>

  </div>

  <!-- ░░ BOTTOM AD ░░ -->
  <div class="ad-strip ad-bottom" aria-hidden="true">
    <ins class="adsbygoogle" style="display:block"
      data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX" data-ad-slot="YOUR_BOTTOM_AD_SLOT"
      data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
